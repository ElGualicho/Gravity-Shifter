<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gravity Shifter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0015;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden;
      font-family: 'Palatino Linotype', Palatino, serif;
    }
    canvas { display: block; }
    #gameMenu {
      display: flex; position: fixed; inset: 0;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; background: rgba(0,0,0,0.88); z-index: 100;
    }
    #gameMenu h1 { color: gold; font-size: 3em; text-shadow: 2px 2px 8px black; }
    #gameMenu button {
      width: 280px; padding: 15px; background: #333; color: white;
      border: 1px solid gold; border-radius: 6px; font-size: 1.2em;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #gameMenu button:hover  { background: #555; transform: scale(1.03); }
    #gameMenu button:active { background: gold; color: black; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="gameMenu">
    <h1>Gravity Shifter</h1>
    <button onclick="startGame(1)">✨ Nouvelle Partie</button>
  </div>

<script>
const PLAYER_W = 50, PLAYER_H = 50, SPEED = 6, ANIM_SPEED = 0.2, WALK_FRAMES = 4;
const GRAVITY = 0.5;
const TOTAL_LEVELS = 3;

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const menuEl = document.getElementById('gameMenu');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (gameState === 'PLAYING') loadLevel(currentLevel);
}
window.addEventListener('resize', resize);
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

let gameState    = 'MENU';
let currentLevel = 1;
let gravityDir   = 1;
let pendingFlip  = false;
let platforms = [], hazards = [], goal = {};
let player = {};

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space'  && gameState === 'PLAYING') pendingFlip = true;
  if (e.code === 'Escape' && gameState === 'PLAYING') showMenu();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function flushKeys() {
  keys['ArrowLeft']  = false;
  keys['ArrowRight'] = false;
  keys['Space']      = false;
}

function getLevelData(lv) {
  const W = canvas.width, H = canvas.height;
  const floorY = H - 60;
  const floor  = { x: 0, y: floorY, w: W * 2, h: 100 };
  const goalDef = { x: W - 150, y: floorY - 110, w: 100, h: 110 };
  const data = {
    1: {
      start: { x: 80, y: 200 },
      platforms: [ floor,
        { x: 350, y: 400, w: 250, h: 80 }, { x: 700,  y: 200, w: 200, h: 70 },
        { x: 1000, y: 450, w: 150, h: 60 }, { x: 200, y: 150, w: 120, h: 60 },
        { x: 1250, y: 300, w: 180, h: 70 } ],
      hazards: [
        { x: 600, y: floorY - 50, w: 120, h: 60, side: 'bottom' },
        { x: 450, y: 45,          w: 120, h: 60, side: 'top' } ],
      goal: goalDef,
    },
    2: {
      start: { x: 80, y: H - 150 },
      platforms: [ floor,
        { x: 300, y: H - 220, w: 140, h: 60 }, { x: 550,  y: 180,     w: 120, h: 50 },
        { x: 850, y: H - 250, w: 160, h: 70 }, { x: 1100, y: 150,     w: 110, h: 50 },
        { x: 1400, y: 380,    w: 130, h: 60 } ],
      hazards: [
        { x: 450, y: floorY - 50, w: 300, h: 60, side: 'bottom' },
        { x: 700, y: 45,          w: 240, h: 60, side: 'top' } ],
      goal: goalDef,
    },
    // Niveau 3 — Le Plafond Miroir
    // Mécanique : deux segments de plafond à atteindre en inversant la gravité
    // Chemin : sol → flip → plafond 1 → flip → sol → flip → plafond 2 → flip → sol → drapeau
    3: {
      start: { x: 80, y: H / 2 },
      platforms: [
        floor,
        { x: 180, y: 0, w: 420, h: 50 },  // plafond 1 : x 180→600
        { x: 660, y: 0, w: 400, h: 50 },  // plafond 2 : x 660→1060
      ],
      hazards: [
        // Piques sol zone 1 (x:240→500) → oblige à monter au plafond 1
        { x: 240, y: floorY - 55, w: 260, h: 55, side: 'bottom' },
        // Piques sol zone 2 (x:760→1020) → oblige à monter au plafond 2
        { x: 760, y: floorY - 55, w: 260, h: 55, side: 'bottom' },
      ],
      goal: goalDef,
    },
  };
  return data[lv] || null;
}

function loadLevel(lv) {
  currentLevel = lv;
  gravityDir   = 1;
  pendingFlip  = false;
  flushKeys();
  const d = getLevelData(lv);
  platforms = d.platforms;
  hazards   = d.hazards;
  goal      = d.goal;
  player    = {
    x: d.start.x, y: d.start.y,
    w: PLAYER_W,  h: PLAYER_H,
    velY: 0, onSurface: false,
    facingRight: true, animFrame: 0, isMoving: false
  };
}

function showMenu() {
  gameState = 'MENU';
  menuEl.style.display = 'flex';
  flushKeys();
}

function startGame(lv) {
  menuEl.style.display = 'none';
  gameState = 'PLAYING';
  loadLevel(lv);
}
window.startGame = startGame;

function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function update() {
  const p = player;

  if (pendingFlip && p.onSurface) {
    gravityDir *= -1;
    p.onSurface = false;
    p.y += gravityDir * 10;
  }
  pendingFlip = false;

  p.isMoving = false;
  let nx = p.x;
  if (keys['ArrowRight']) { nx += SPEED; p.isMoving = true; p.facingRight = true; }
  if (keys['ArrowLeft'])  { nx -= SPEED; p.isMoving = true; p.facingRight = false; }
  if (!platforms.some(pl => overlaps(nx, p.y, p.w, p.h, pl.x, pl.y, pl.w, pl.h)))
    p.x = nx;
  p.x = Math.max(0, Math.min(p.x, canvas.width - p.w));

  if (p.isMoving && p.onSurface) {
    p.animFrame = (p.animFrame + ANIM_SPEED) % WALK_FRAMES;
  } else {
    p.animFrame = 0;
  }

  p.velY     += GRAVITY * gravityDir;
  p.y        += p.velY;
  p.onSurface = false;

  for (const pl of platforms) {
    if (!overlaps(p.x, p.y, p.w, p.h, pl.x, pl.y, pl.w, pl.h)) continue;
    if (gravityDir === 1) {
      if (p.velY > 0) { p.y = pl.y - p.h; p.velY = 0; p.onSurface = true; }
      else            { p.y = pl.y + pl.h; p.velY = 0; }
    } else {
      if (p.velY < 0) { p.y = pl.y + pl.h; p.velY = 0; p.onSurface = true; }
      else            { p.y = pl.y - p.h;  p.velY = 0; }
    }
  }

  for (const h of hazards) {
    if (overlaps(p.x, p.y, p.w, p.h, h.x, h.y, h.w, h.h)) {
      setTimeout(() => { alert('Le Néant vous a rattrapé...'); loadLevel(currentLevel); }, 0);
      return;
    }
  }

  if (p.y < -100 || p.y > canvas.height + 100) {
    setTimeout(() => { alert("Perdu dans l'éther..."); loadLevel(currentLevel); }, 0);
    return;
  }

  if (overlaps(p.x, p.y, p.w, p.h, goal.x, goal.y, goal.w, goal.h)) {
    if (currentLevel < TOTAL_LEVELS) {
      setTimeout(() => { alert('Niveau ' + currentLevel + ' réussi !'); loadLevel(currentLevel + 1); }, 0);
    } else {
      setTimeout(() => { alert('Incroyable ! Vous êtes le Maître de la Gravité !'); showMenu(); }, 0);
    }
  }
}

function draw() {
  const W = canvas.width, H = canvas.height;
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a0050');
  bg.addColorStop(1, '#0d001a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'MENU') return;

  const floorY = H - 60;
  ctx.fillStyle = '#7b5e3a';
  ctx.fillRect(0, floorY, W, 70);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(0, floorY, W, 4);

  for (const pl of platforms) {
    if (pl.y >= floorY - 5) continue;
    // Plafonds (y proche de 0) : couleur différente pour les distinguer
    ctx.fillStyle = pl.y <= 5 ? '#3a7a8a' : '#5a9e6f';
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    // Highlight : en bas pour les plafonds, en haut pour les plateformes normales
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    if (pl.y <= 5) {
      ctx.fillRect(pl.x, pl.y + pl.h - 4, pl.w, 4); // bord bas du plafond
    } else {
      ctx.fillRect(pl.x, pl.y, pl.w, 4);             // bord haut des plateformes
    }
  }

  for (const h of hazards) {
    ctx.fillStyle = '#e74c3c';
    const sw = 20;
    const count = Math.floor(h.w / sw);
    for (let i = 0; i < count; i++) {
      const sx = h.x + i * sw;
      ctx.beginPath();
      if (h.side === 'top') {
        ctx.moveTo(sx, h.y); ctx.lineTo(sx + sw/2, h.y + h.h); ctx.lineTo(sx + sw, h.y);
      } else {
        ctx.moveTo(sx, h.y + h.h); ctx.lineTo(sx + sw/2, h.y); ctx.lineTo(sx + sw, h.y + h.h);
      }
      ctx.closePath(); ctx.fill();
    }
  }

  ctx.fillStyle = '#888';
  ctx.fillRect(goal.x + 4, goal.y, 5, goal.h);
  ctx.fillStyle = '#f1c40f';
  ctx.fillRect(goal.x + 9, goal.y, 45, 32);
  ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = 18;
  ctx.fillRect(goal.x + 9, goal.y, 45, 32);
  ctx.shadowBlur = 0;

  const p = player;
  ctx.save();
  ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
  ctx.scale(p.facingRight ? 1 : -1, gravityDir === -1 ? -1 : 1);
  ctx.fillStyle = '#3498db';
  ctx.fillRect(-p.w/2, -p.h/2 + 10, p.w, p.h - 10);
  ctx.fillStyle = '#5dade2';
  ctx.beginPath();
  ctx.arc(0, -p.h/2 + 8, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'white'; ctx.fillRect(4, -p.h/2 + 2, 8, 8);
  ctx.fillStyle = '#1a252f'; ctx.fillRect(6, -p.h/2 + 4, 4, 4);
  ctx.restore();

  ctx.fillStyle = 'white';
  ctx.font = "italic 20px 'Palatino Linotype', serif";
  ctx.textAlign = 'center';
  ctx.shadowBlur = 8; ctx.shadowColor = 'black';
  ctx.fillText(
    'Chapitre ' + currentLevel + '  •  ← → déplacer  •  Espace inverser gravité',
    W / 2, H - 25
  );
  ctx.shadowBlur = 0;
}

function loop() {
  if (gameState === 'PLAYING') update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
